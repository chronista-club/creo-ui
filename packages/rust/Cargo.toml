[package]
name = "creo-ui"
version = "0.4.0"
edition = "2024"
rust-version = "1.95"
description = "Creo UI - Design System tokens for Rust consumers (ratatui / egui / iced / dioxus interop)"
license = "Apache-2.0"
repository = "https://github.com/chronista-club/creo-ui"
readme = "README.md"

[lib]
name = "creo_ui"
path = "src/lib.rs"

[features]
default = []
# TUI framework integrations (opt-in; keeps base crate zero-dep)
ratatui = ["dep:ratatui"]
egui = ["dep:egui"]
iced = ["dep:iced_core"]
dioxus = []

[dependencies]
ratatui = { version = "0.29", optional = true, default-features = false }
egui = { version = "0.29", optional = true, default-features = false }
iced_core = { version = "0.13", optional = true, default-features = false }

[dev-dependencies]
