name: Publish creoui to npm

on:
  push:
    tags: ["web-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match package.json or leave blank to use current)"
        required: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: creoui
    steps:
      # creoui を nested path に checkout、 creo-views を sibling として
      # 並行 checkout (packages/md-view の `file:../../../creo-views` 解決のため)。
      # ci.yml と同 layout。
      - name: Checkout creoui
        uses: actions/checkout@v4
        with:
          path: creoui

      - name: Checkout creo-views (sibling, required by packages/md-view)
        uses: actions/checkout@v4
        with:
          repository: chronista-club/creo-views
          path: creo-views

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies (root workspace)
        run: bun install --frozen-lockfile

      - name: Build web tokens (from repo root)
        # style-dictionary config の path (tokens/**, packages/web/dist/) は
        # repo root からの相対なので、root cwd で実行する必要あり
        run: bun run build:web

      - name: Verify dist/tokens.css exists
        run: test -s packages/web/dist/tokens.css

      - name: Publish to npm
        working-directory: creoui/packages/web
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
