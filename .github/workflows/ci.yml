name: CI

# PR ゲート。 n = 開発 trunk (default) / main = release。 2026-05-30 移行
# (creo-memories の n/main 二段運用と parity)
on:
  push:
    branches: [n, main]
  pull_request:
    branches: [n, main]
  workflow_dispatch: # CI 不具合時の debug 用に手動起動可

jobs:
  build:
    name: Build & Lint (Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: creoui
    steps:
      # creoui は workspace 配下の `creoui/` に置く。 sibling として
      # `creo-views/` も同階層に配置 — `packages/md-view/package.json` の
      # `"creo-views": "file:../../../creo-views"` (md-view から 3 階層上 =
      # workspace root) と整合する。 local dev (`~/repos/creoui` /
      # `~/repos/creo-views`) と同 layout。
      - name: Checkout creoui
        uses: actions/checkout@v4
        with:
          path: creoui

      - name: Checkout creo-views (sibling, required by packages/md-view)
        uses: actions/checkout@v4
        with:
          repository: chronista-club/creo-views
          path: creo-views

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build tokens (Web / Swift / Rust)
        run: bun run build

      - name: Token diff (Swift / Rust generated は commit 対象)
        # tokens/ を編集した PR が Swift/Rust の generated 更新を
        # 忘れていないか検証する。Web の dist/ は gitignore なので対象外。
        run: |
          git diff --exit-code \
            packages/swift/Sources/Creoui/Generated/ \
            packages/rust/src/generated/

      - name: Typecheck apps/site
        # root tsconfig.json は apps/ を include しないため、
        # apps/site の dogfood code は別途 typecheck する。
        # editor-host API drift / dogfood callsite の signature mismatch を検出。
        #
        # workspace package の `package.json` exports は publish 用 `./dist/...`
        # を指すが、 CI / dev 環境で dist/ は build しないと無い (gitignore)。
        # apps/site/tsconfig.json に `paths` で workspace member を src/ に
        # 直接 map することで、 dist build 無しで typecheck 可能にしている。
        working-directory: creoui/apps/site
        run: bun x tsc --noEmit

  rust:
    name: Rust build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - name: Build
        working-directory: packages/rust
        run: cargo build --verbose

      - name: Test
        working-directory: packages/rust
        run: cargo test --verbose

      - name: Test (ratatui feature)
        working-directory: packages/rust
        run: cargo test --features ratatui --verbose

  swift:
    name: Swift build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: packages/swift
        run: swift build

      - name: Test
        working-directory: packages/swift
        run: swift test
