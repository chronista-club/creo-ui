name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint (Web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: creo-ui
    steps:
      # creo-ui は workspace 配下の `creo-ui/` に置く。 sibling として
      # `creo-views/` も同階層に配置 — `packages/md-view/package.json` の
      # `"creo-views": "file:../../../creo-views"` (md-view から 3 階層上 =
      # workspace root) と整合する。 local dev (`~/repos/creo-ui` /
      # `~/repos/creo-views`) と同 layout。
      - name: Checkout creo-ui
        uses: actions/checkout@v4
        with:
          path: creo-ui

      - name: Checkout creo-views (sibling, required by packages/md-view)
        uses: actions/checkout@v4
        with:
          repository: chronista-club/creo-views
          path: creo-views

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build tokens (Web / Swift / Rust)
        run: bun run build

      - name: Token diff (Swift / Rust generated は commit 対象)
        # tokens/ を編集した PR が Swift/Rust の generated 更新を
        # 忘れていないか検証する。Web の dist/ は gitignore なので対象外。
        run: |
          git diff --exit-code \
            packages/swift/Sources/CreoUI/Generated/ \
            packages/rust/src/generated/

      - name: Debug workspace links (examples/docs)
        # Round 3 fix の debug step。 bun 1.3.x の `--frozen-lockfile` mode が
        # workspace member 内 node_modules への symlink 作成を skip する場合があり、
        # `Cannot find module 'creo-ui-editor-host'` で typecheck が cascade fail
        # する。 link 不在なら明示的に作って recovery を試みる。
        run: |
          echo "=== bun version ==="
          bun --version
          echo "=== root node_modules creo-ui-* ==="
          ls -la node_modules | grep creo-ui || echo "(no creo-ui-* in root)"
          echo "=== examples/docs/node_modules creo-ui-* ==="
          ls -la examples/docs/node_modules 2>/dev/null | grep creo-ui || echo "(no creo-ui-* in examples/docs/node_modules)"
          echo "=== fallback: rm + non-frozen install for examples/docs link ==="
          rm -rf examples/docs/node_modules
          bun install
          echo "=== after fallback ==="
          ls -la examples/docs/node_modules | grep creo-ui || echo "(STILL no creo-ui-*)"

      - name: Typecheck examples/docs
        # root tsconfig.json は examples/ を include しないため、
        # examples/docs の dogfood code は別途 typecheck する。
        # editor-host API drift / dogfood callsite の signature mismatch を検出。
        working-directory: creo-ui/examples/docs
        run: bun x tsc --noEmit

  rust:
    name: Rust build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - name: Build
        working-directory: packages/rust
        run: cargo build --verbose

      - name: Test
        working-directory: packages/rust
        run: cargo test --verbose

      - name: Test (ratatui feature)
        working-directory: packages/rust
        run: cargo test --features ratatui --verbose

  swift:
    name: Swift build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: packages/swift
        run: swift build

      - name: Test
        working-directory: packages/swift
        run: swift test
