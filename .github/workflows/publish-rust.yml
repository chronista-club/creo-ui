name: Publish creoui (Rust) to crates.io

on:
  push:
    tags: ["rust-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match Cargo.toml)"
        required: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - name: Verify Cargo.toml version matches tag
        if: startsWith(github.ref, 'refs/tags/rust-v')
        working-directory: packages/rust
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/rust-v}"
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "✓ version match: $TAG_VERSION"

      - name: Build (default)
        working-directory: packages/rust
        run: cargo build --verbose

      - name: Test (default)
        working-directory: packages/rust
        run: cargo test --verbose

      - name: Test (ratatui feature)
        working-directory: packages/rust
        run: cargo test --features ratatui --verbose

      - name: Test (egui feature)
        working-directory: packages/rust
        run: cargo test --features egui --verbose

      - name: Publish to crates.io
        working-directory: packages/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
