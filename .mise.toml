## creoui — mise 設定
##
## 開発環境 (bun) と task 群を mise 配下で統一管理する。
## 使い方:
##   mise install          → bun を auto-install
##   mise tasks            → 利用可能な task 一覧
##   mise run build        → 全 token 出力を再生成
##   mise run dev          → web demo dev server 起動
##
## package.json の scripts も残しているので、bun run X 経由でも動く。

[tools]
bun = "1.3"

[tasks.install]
description = "Install dependencies (bun)"
run = "bun install"

[tasks.build]
description = "Build all token outputs (web + swift + rust)"
depends = ["build:web", "build:swift", "build:rust"]

[tasks."build:web"]
description = "Build web tokens (CSS + JS) + components.css concat"
run = [
  "bun x style-dictionary build --config transforms/config.web.js",
  "bun scripts/build-web-components.mjs",
]

[tasks."build:swift"]
description = "Build Swift tokens (committed to packages/swift/Sources/Creoui/Generated/)"
run = "bun x style-dictionary build --config transforms/config.swift.js"

[tasks."build:rust"]
description = "Build Rust tokens (committed to packages/rust/src/generated/)"
run = "bun x style-dictionary build --config transforms/config.rust.js"

[tasks.dev]
description = "Run web demo dev server"
dir = "examples/web-demo"
run = [
  "bun install --silent",
  "bun run dev",
]

[tasks.typecheck]
description = "TypeScript type check"
run = "bun x tsc --noEmit"

[tasks.lint]
description = "Biome lint"
run = "bun x biome check ."

[tasks.format]
description = "Biome format (write)"
run = "bun x biome check . --write"

[tasks."gen:themes"]
description = "Generate theme variants"
run = "bun scripts/generate-themes.mjs"

[tasks."test:colors"]
description = "Test color utilities"
run = "bun test transforms/color-utils.test.js"

## Windows-only task の例 (将来必要になったら):
## [tasks."win:something"]
## platforms = ["windows"]
## run = "..."
